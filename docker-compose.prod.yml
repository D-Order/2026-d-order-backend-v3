services:
  nginx:
    image: ${DOCKER_USERNAME:-local}/d-order-nginx:prod
    container_name: d-order-nginx-prod
    environment:
      DOMAIN: ${DOMAIN:-dorder-api.shop}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
      - static_volume_prod:/app/static:ro
      - nginx_logs_prod:/var/log/nginx
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost/health/',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - d-order-network-prod
    restart: unless-stopped

  # Let's Encrypt SSL 인증서 자동 발급/갱신
  certbot:
    image: certbot/certbot:latest
    container_name: d-order-certbot-prod
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - d-order-network-prod
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: d-order-postgres-prod
    # 필수 env가 비어 있으면 컨테이너를 띄우지 않음 (빈 비밀번호로 유저가 생성되는 사고 방지)
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB not set}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER not set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
      POSTGRES_INITDB_ARGS: -U postgres
      PGDATA: /var/lib/postgresql/data/pgdata
      SPRING_DB_USER: ${SPRING_DB_USER:?SPRING_DB_USER not set}
      SPRING_DB_PASSWORD: ${SPRING_DB_PASSWORD:?SPRING_DB_PASSWORD not set}
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./db-scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - d-order-network-prod
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: d-order-redis-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    # prod에서는 Redis 포트 외부 노출 금지
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a ${REDIS_PASSWORD} ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - d-order-network-prod
    restart: unless-stopped

  django-blue:
    image: ${DOCKER_USERNAME:-local}/d-order-django:prod
    container_name: d-order-django-blue-prod
    profiles: ['blue']
    command: daphne -b 0.0.0.0 -p 8000 project.asgi:application
    environment:
      ENVIRONMENT: production
      DEBUG: 'False'
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS_PRODUCTION: ${ALLOWED_HOSTS_PRODUCTION}
      CORS_ALLOWED_ORIGINS_FRONTEND: ${CORS_ALLOWED_ORIGINS_FRONTEND}
      CORS_ALLOWED_ORIGINS_BACKEND: ${CORS_ALLOWED_ORIGINS_BACKEND}
      DB_ENGINE: ${DB_ENGINE}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SECURE_SSL_REDIRECT: 'False'  # nginx가 SSL 처리하므로 Django 내부 리다이렉트 불필요
      CSRF_COOKIE_SECURE: 'True'
      SESSION_COOKIE_SECURE: 'True'
      SESSION_COOKIE_HTTPONLY: 'True'
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME}
      CUSTOMER_FRONT_BASE_URL: ${CUSTOMER_FRONT_BASE_URL}
    expose:
      - '8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_volume_prod:/app/static
      - django_logs_prod:/app/logs
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 15s
      timeout: 5s
      start_period: 40s
      retries: 3
    stop_grace_period: 30s
    networks:
      d-order-network-prod:
        aliases:
          - django-active
    restart: unless-stopped

  django-green:
    image: ${DOCKER_USERNAME:-local}/d-order-django:prod
    container_name: d-order-django-green-prod
    profiles: ['green']
    command: daphne -b 0.0.0.0 -p 8000 project.asgi:application
    environment:
      ENVIRONMENT: production
      DEBUG: 'False'
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS_PRODUCTION: ${ALLOWED_HOSTS_PRODUCTION}
      CORS_ALLOWED_ORIGINS_FRONTEND: ${CORS_ALLOWED_ORIGINS_FRONTEND}
      CORS_ALLOWED_ORIGINS_BACKEND: ${CORS_ALLOWED_ORIGINS_BACKEND}
      DB_ENGINE: ${DB_ENGINE}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SECURE_SSL_REDIRECT: 'False'  # nginx가 SSL 처리하므로 Django 내부 리다이렉트 불필요
      CSRF_COOKIE_SECURE: 'True'
      SESSION_COOKIE_SECURE: 'True'
      SESSION_COOKIE_HTTPONLY: 'True'
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME}
      CUSTOMER_FRONT_BASE_URL: ${CUSTOMER_FRONT_BASE_URL}
    expose:
      - '8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_volume_prod:/app/static
      - django_logs_prod:/app/logs
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 15s
      timeout: 5s
      start_period: 40s
      retries: 3
    stop_grace_period: 30s
    networks:
      d-order-network-prod:
        aliases:
          - django-active
    restart: unless-stopped

  spring-blue:
    image: ${DOCKER_USERNAME:-local}/d-order-spring:prod
    container_name: d-order-spring-blue-prod
    profiles: ['blue']
    command: ['--spring.profiles.active=prod']
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB not set}
      SPRING_DB_USER: ${SPRING_DB_USER:?SPRING_DB_USER not set}
      SPRING_DB_PASSWORD: ${SPRING_DB_PASSWORD:?SPRING_DB_PASSWORD not set}
      DB_HOST: postgres
      SECRET_KEY: ${SECRET_KEY}
      DJANGO_API_URL: ${DJANGO_API_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    expose:
      - '8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:8080/health',
        ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    stop_grace_period: 30s
    networks:
      - d-order-network-prod
    restart: unless-stopped

  spring-green:
    image: ${DOCKER_USERNAME:-local}/d-order-spring:prod
    container_name: d-order-spring-green-prod
    profiles: ['green']
    command: ['--spring.profiles.active=prod']
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB not set}
      SPRING_DB_USER: ${SPRING_DB_USER:?SPRING_DB_USER not set}
      SPRING_DB_PASSWORD: ${SPRING_DB_PASSWORD:?SPRING_DB_PASSWORD not set}
      DB_HOST: postgres
      SECRET_KEY: ${SECRET_KEY}
      DJANGO_API_URL: ${DJANGO_API_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    expose:
      - '8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:8080/health',
        ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    stop_grace_period: 30s
    networks:
      - d-order-network-prod
    restart: unless-stopped

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local
  static_volume_prod:
    driver: local
  nginx_logs_prod:
    driver: local
  django_logs_prod:
    driver: local
  certbot_www:
    driver: local
  certbot_certs:
    driver: local

networks:
  d-order-network-prod:
    driver: bridge
