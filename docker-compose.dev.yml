services:
  nginx:
    image: ${DOCKER_USERNAME:-local}/d-order-nginx:dev
    container_name: d-order-nginx-dev
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
      - static_volume_dev:/app/static:ro
      - nginx_logs_dev:/var/log/nginx
    depends_on:
      - django
      - spring
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost/health/django",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - d-order-network-dev
    restart: unless-stopped

  # Let's Encrypt SSL 인증서 자동 발급/갱신
  certbot:
    image: certbot/certbot:latest
    container_name: d-order-certbot-dev
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - d-order-network-dev
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: d-order-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: -U postgres
      PGDATA: /var/lib/postgresql/data/pgdata
      # Spring 유저 생성용 환경변수 (init-db.sh에서 사용)
      SPRING_DB_USER: ${SPRING_DB_USER:-spring_user}
      SPRING_DB_PASSWORD: ${SPRING_DB_PASSWORD:-spring_password}
      # 타임존 설정
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./db-scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - d-order-network-dev
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: d-order-redis-dev
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - d-order-network-dev
    restart: unless-stopped

  django:
    image: ${DOCKER_USERNAME:-local}/d-order-django:dev
    container_name: d-order-django-dev
    command: daphne -b 0.0.0.0 -p 8000 project.asgi:application
    environment:
      ENVIRONMENT: development
      DEBUG: "True"
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS_DEV: ${ALLOWED_HOSTS_DEV}
      ALLOWED_HOSTS_LOCAL: ${ALLOWED_HOSTS_LOCAL}
      CORS_ALLOWED_ORIGINS_DEV: ${CORS_ALLOWED_ORIGINS_DEV}
      CORS_ALLOWED_ORIGINS_LOCAL: ${CORS_ALLOWED_ORIGINS_LOCAL}
      DB_ENGINE: ${DB_ENGINE}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SECURE_SSL_REDIRECT: "False"
      CSRF_COOKIE_SECURE: "False"
      SESSION_COOKIE_SECURE: "False"
      CSRF_COOKIE_HTTPONLY: "True"
      SESSION_COOKIE_HTTPONLY: "True"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_volume_dev:/app/static
    networks:
      - d-order-network-dev
    restart: unless-stopped

  # Django와 같은 PostgreSQL/Redis를 공유하되, 별도 DB 유저 사용
  spring:
    # build + image 둘 다 지정:
    # - 기본: image에서 pull
    # - docker-compose up --build: 로컬에서 Dockerfile로 빌드
    build:
      context: ./spring
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME:-local}/d-order-spring:dev
    container_name: d-order-spring-dev
    environment:
      # Spring 프로필 설정 (application.yml의 dev 프로필 사용)
      SPRING_PROFILES_ACTIVE: dev
      # DB 설정 - Spring 전용 유저 사용 (init-db.sh에서 생성)
      POSTGRES_DB: ${POSTGRES_DB}
      SPRING_DB_USER: ${SPRING_DB_USER}
      SPRING_DB_PASSWORD: ${SPRING_DB_PASSWORD}
      # Redis 설정 - Django와 공유
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - d-order-network-dev
    restart: unless-stopped

volumes:
  postgres_data_dev:
    driver: local
  redis_data_dev:
    driver: local
  static_volume_dev:
    driver: local
  # S3 버킷 사용으로 주석처리
  # media_volume_dev:
  #   driver: local
  nginx_logs_dev:
    driver: local
  certbot_www:
    driver: local
  certbot_certs:
    driver: local

networks:
  d-order-network-dev:
    driver: bridge
