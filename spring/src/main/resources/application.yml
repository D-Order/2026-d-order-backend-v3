# ==================================================================
# кіөнҶө м„Өм •
# ==================================================================
spring:
  application:
    name: spring
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        # MySQLDialectлҘј PostgreSQLDialectлЎң ліҖкІҪ
        dialect: org.hibernate.dialect.PostgreSQLDialect

---
# ==================================================================
# local (к°ңл°ң) нҷҳкІҪ м „мҡ© м„Өм •
# ==================================================================
spring:
  config:
    activate:
      on-profile: local
  datasource:
    # URL: mysql -> postgresql / нҸ¬нҠё 3306 -> 5432 / DB мқҙлҰ„ нҷ•мқё
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    # .envм—җ м •мқҳлҗң ліҖмҲҳлӘ…кіј мқјм№ҳмӢңмјңм•ј н•©лӢҲлӢӨ.
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update