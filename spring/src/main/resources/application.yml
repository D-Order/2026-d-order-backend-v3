# ==================================================================
# 공통 설정
# ==================================================================
spring:
  application:
    name: spring

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        # MySQLDialect를 PostgreSQLDialect로 변경
        dialect: org.hibernate.dialect.PostgreSQLDialect

# ==================================================================
# JWT 설정 (Django에서 발급한 토큰 검증용)
# ==================================================================
jwt:
  secret-key: ${SECRET_KEY}
  access-token-expiration: 900000 # 15분 (밀리초)
  refresh-token-expiration: 3600000 # 1시간 (밀리초)
  cookie:
    access-token-name: access_token
    refresh-token-name: refresh_token
    http-only: true
    same-site: Lax
    secure: false # 로컬에서는 false, 프로덕션에서는 true

# ==================================================================
# Django API 설정 (BFF 패턴)
# ==================================================================
django:
  api:
    base-url: ${DJANGO_API_URL:http://localhost:8000}

---
# ==================================================================
# local 환경 전용 설정
# 로컬에서 직접 실행할 때 사용 (IDE에서 Run)
# docker-compose.local_env.yml로 DB/Redis만 띄우고 연결
# ==================================================================
spring:
  config:
    activate:
      on-profile: local
  datasource:
    # 로컬에서는 localhost로 접속 (DB 컨테이너 포트 포워딩)
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:d_order}
    # 로컬 개발 시에는 관리자 계정 사용 (편의상)
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
  # Redis 설정을 추가
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

---
# ==================================================================
# dev 환경 전용 설정 (Docker 컨테이너용)
# docker-compose.dev.yml에서 사용
# Spring 전용 DB 유저(spring_user)로 연결
# ==================================================================
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    # Docker 네트워크 내에서는 서비스 이름(postgres)으로 접속
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:d_order}
    # Spring 전용 유저 사용 (init-db.sh에서 생성됨)
    # 보안: Django와 분리된 권한 관리
    username: ${SPRING_DB_USER:spring_user}
    password: ${SPRING_DB_PASSWORD:spring_password}
    driver-class-name: org.postgresql.Driver
    # 커넥션 풀 설정 (HikariCP)
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      # dev 환경: 스키마 자동 업데이트 (운영에서는 none 또는 validate)
      ddl-auto: update
    properties:
      hibernate:
        # dev 환경에서는 SQL 로깅 활성화
        show_sql: true
        format_sql: true
  # Redis 설정 (같은 Redis를 Django와 공유)
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

---
# ==================================================================
# prod 환경 전용 설정 (Docker 컨테이너용)
# docker-compose.prod.yml에서 사용
# DB_HOST는 AWS RDS 엔드포인트
# ==================================================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${POSTGRES_DB:d_order}
    username: ${SPRING_DB_USER}
    password: ${SPRING_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: false
        format_sql: false
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

jwt:
  cookie:
    secure: true
    same-site: "None"    # Django와 동일 (Safari/iOS WebSocket 쿠키 누락 방지) - 따옴표 필수 (YAML에서 None은 null로 파싱됨)
    domain: .dorder-api.shop  # 모든 서브도메인 쿠키 공유

# 서버 설정
server:
  port: 8080
