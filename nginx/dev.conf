# Nginx 개발 환경 설정 - D-Order Backend v3

# 전역 설정
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 로그 포맷
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 기본 설정
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip 압축
    # 네트워크 전송 데이터 크기를 줄인다네요
    # 속도 향상에 도움되는 것 같아서 넣었어요
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6; # 압축 수준 (1-9) 높으면 더 느림
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # 업스트림 정의 - Django 서비스
    # 이건 docker-compose.dev.yml 에 정의된 서비스 이름과 포트를 맞춰야함.
    upstream django_backend {
        server django:8000;
    }

    # 업스트림 정의 - Spring Boot 서비스
    # upstream springboot_backend {
    #     server springboot:8080;
    # }

    # HTTP 서버 (80) - HTTPS로 리다이렉트
    server {
        listen 80;
        listen [::]:80;
        server_name dev.dorder-api.shop;

        # Let's Encrypt ACME Challenge (SSL 인증서 발급용)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 나머지는 HTTPS로 리다이렉트
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS 서버 (443)
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name dev.dorder-api.shop;

        # SSL 인증서 설정 (Let's Encrypt)
        # 도메인: ${DOMAIN} 환경변수로 설정
        ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

        # SSL 설정
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 보안 헤더
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;


        #
        # 밑 부터는 각종 location 설정
        # TODO: Spring Boot 서비스가 추가되면 location 수정 필요
        #
        #


        # Health Check - Django
        location /health/django {
            proxy_pass http://django_backend/health/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Health check는 빠르게 응답해야 함
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # Health Check - Spring Boot
        # location /health/spring {
        #     proxy_pass http://springboot_backend/actuator/health;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #
        #     proxy_connect_timeout 5s;
        #     proxy_read_timeout 5s;
        # }

        # 정적 파일 제공
        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # 미디어 파일 제공
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # WebSocket django 엔드포인트
        # TODO : springboot도 웹소켓 추가 필요
        location /ws-django/ {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;

            # WebSocket 필수 헤더
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 기본 프록시 헤더
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 타임아웃 설정
            proxy_read_timeout 86400;
            proxy_connect_timeout 86400;
            proxy_send_timeout 86400;
        }

        # API 엔드포인트
        # XXX 이거 api/v3/django 이런식으로 해야하나?
        location /api/v3/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 타임아웃 설정
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # # Admin 패널 
        # location /admin/ {
        #     proxy_pass http://django_backend;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }

        # 기본 경로 (일단 Django로 프록시)
        location / {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
