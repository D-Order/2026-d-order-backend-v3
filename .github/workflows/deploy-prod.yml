# PROD 환경 자동 배포 워크플로우 (Blue-Green)
# 트리거: PROD 관련 라벨이 붙은 PR이 main 브랜치에 머지될 때, 또는 수동 실행
#
# 라벨별 동작:
#   - PROD: 전체 배포 (Django + Nginx + Spring, Blue-Green)
#   - PROD-DJANGO: Django만 Blue-Green 배포
#   - PROD-SPRING: Spring만 Blue-Green 배포
#   - PROD-NGINX: Nginx만 재배포

name: Deploy to PROD

on:
  pull_request_target:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_target:
        description: '배포 대상 선택'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - django
          - spring
          - nginx

env:
  DEPLOY_PATH: /home/ubuntu/dorder

jobs:
  # 라벨 확인 (PR 머지 시) 또는 수동 입력 처리
  check-labels:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      deploy-all: ${{ github.event_name == 'pull_request_target' || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'all') }}
      deploy-django: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'django' }}
      deploy-spring: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'spring' }}
      deploy-nginx: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'nginx' }}
    steps:
      - name: Check labels
        run: |
          echo "PROD: ${{ contains(github.event.pull_request.labels.*.name, 'PROD') }}"
          echo "PROD-DJANGO: ${{ contains(github.event.pull_request.labels.*.name, 'PROD-DJANGO') }}"
          echo "PROD-SPRING: ${{ contains(github.event.pull_request.labels.*.name, 'PROD-SPRING') }}"
          echo "PROD-NGINX: ${{ contains(github.event.pull_request.labels.*.name, 'PROD-NGINX') }}"
          echo "Manual target: ${{ github.event.inputs.deploy_target }}"

  # Django 빌드 & 푸시
  build-django:
    needs: check-labels
    if: needs.check-labels.outputs.deploy-all == 'true' || needs.check-labels.outputs.deploy-django == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Django image
        uses: docker/build-push-action@v5
        with:
          context: ./django
          file: ./django/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/d-order-django:prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Nginx 빌드 & 푸시
  build-nginx:
    needs: check-labels
    if: needs.check-labels.outputs.deploy-all == 'true' || needs.check-labels.outputs.deploy-nginx == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          build-args: NGINX_ENV=prod
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/d-order-nginx:prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Spring 빌드 & 푸시
  build-spring:
    needs: check-labels
    if: needs.check-labels.outputs.deploy-all == 'true' || needs.check-labels.outputs.deploy-spring == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Spring image
        uses: docker/build-push-action@v5
        with:
          context: ./spring
          file: ./spring/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/d-order-spring:prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # EC2 배포
  deploy:
    needs: [check-labels, build-django, build-nginx, build-spring]

    if: |
      always() &&
      needs.check-labels.result == 'success' &&
      (needs.build-django.result == 'success' || needs.build-django.result == 'skipped') &&
      (needs.build-nginx.result == 'success' || needs.build-nginx.result == 'skipped') &&
      (needs.build-spring.result == 'success' || needs.build-spring.result == 'skipped') &&
      (needs.build-django.result == 'success' || needs.build-nginx.result == 'success' || needs.build-spring.result == 'success')

    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # docker-compose.prod.yml 복사 (PROD 전체 배포 시)
      - name: Copy docker-compose to EC2
        if: needs.check-labels.outputs.deploy-all == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY_PROD }}
          source: "docker-compose.prod.yml"
          target: ${{ env.DEPLOY_PATH }}

      # 전체 Blue-Green 배포 (PROD 라벨)
      - name: Deploy ALL services (Blue-Green)
        if: needs.check-labels.outputs.deploy-all == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY_PROD }}
          script: |
            cd ${{ env.DEPLOY_PATH }}

            echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

            # 현재 active color 확인 (서비스별로 독립 관리)
            DJANGO_COLOR=$(cat .color_django 2>/dev/null || echo "")
            SPRING_COLOR=$(cat .color_spring 2>/dev/null || echo "")

            if [ -z "$DJANGO_COLOR" ]; then
              # ── 최초 배포: blue로 시작
              mkdir -p nginx
              cat > nginx/upstream.conf << 'UPCONF'
            upstream django_backend {
                server django-blue:8000;
                keepalive 32;
            }
            upstream spring_backend {
                server spring-blue:8080;
                keepalive 32;
            }
            UPCONF

              docker compose -f docker-compose.prod.yml --profile blue pull -q
              docker compose -f docker-compose.prod.yml --profile blue up -d --wait --wait-timeout 300

              curl -sf http://localhost/health/django || exit 1
              curl -sf http://localhost/health/spring || exit 1

              echo "blue" > .color_django
              echo "blue" > .color_spring

            else
              # ── Blue-Green 배포
              DJANGO_INACTIVE=$([ "$DJANGO_COLOR" = "blue" ] && echo "green" || echo "blue")
              SPRING_INACTIVE=$([ "$SPRING_COLOR" = "blue" ] && echo "green" || echo "blue")

              docker compose -f docker-compose.prod.yml --profile $DJANGO_INACTIVE pull -q django-${DJANGO_INACTIVE}
              docker compose -f docker-compose.prod.yml --profile $SPRING_INACTIVE pull -q spring-${SPRING_INACTIVE}

              # inactive 컨테이너 시작 (healthcheck 통과까지 대기)
              docker compose -f docker-compose.prod.yml --profile $DJANGO_INACTIVE up -d --no-deps --force-recreate --wait django-${DJANGO_INACTIVE}
              docker compose -f docker-compose.prod.yml --profile $SPRING_INACTIVE up -d --no-deps --force-recreate --wait spring-${SPRING_INACTIVE}

              # nginx upstream 전환
              cat > nginx/upstream.conf << UPCONF
            upstream django_backend {
                server django-${DJANGO_INACTIVE}:8000;
                keepalive 32;
            }
            upstream spring_backend {
                server spring-${SPRING_INACTIVE}:8080;
                keepalive 32;
            }
            UPCONF
              docker compose -f docker-compose.prod.yml exec nginx nginx -s reload

              # 전환 후 헬스 확인
              sleep 3
              curl -sf http://localhost/health/django || exit 1
              curl -sf http://localhost/health/spring || exit 1

              # 기존 active 컨테이너 종료
              docker compose -f docker-compose.prod.yml stop django-${DJANGO_COLOR} spring-${SPRING_COLOR}

              echo $DJANGO_INACTIVE > .color_django
              echo $SPRING_INACTIVE > .color_spring
              docker image prune -f
            fi

            docker compose -f docker-compose.prod.yml --profile blue ps

      # Django만 Blue-Green 배포 (PROD-DJANGO 라벨)
      - name: Deploy DJANGO only (Blue-Green)
        if: needs.check-labels.outputs.deploy-django == 'true' && needs.check-labels.outputs.deploy-all != 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY_PROD }}
          script: |
            cd ${{ env.DEPLOY_PATH }}

            echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

            DJANGO_COLOR=$(cat .color_django 2>/dev/null || echo "blue")
            SPRING_COLOR=$(cat .color_spring 2>/dev/null || echo "blue")
            DJANGO_INACTIVE=$([ "$DJANGO_COLOR" = "blue" ] && echo "green" || echo "blue")

            docker compose -f docker-compose.prod.yml --profile $DJANGO_INACTIVE pull -q django-${DJANGO_INACTIVE}
            docker compose -f docker-compose.prod.yml --profile $DJANGO_INACTIVE up -d --no-deps --force-recreate --wait django-${DJANGO_INACTIVE}

            cat > nginx/upstream.conf << UPCONF
            upstream django_backend {
                server django-${DJANGO_INACTIVE}:8000;
                keepalive 32;
            }
            upstream spring_backend {
                server spring-${SPRING_COLOR}:8080;
                keepalive 32;
            }
            UPCONF
            docker compose -f docker-compose.prod.yml exec nginx nginx -s reload

            sleep 3
            curl -sf http://localhost/health/django || exit 1

            docker compose -f docker-compose.prod.yml stop django-${DJANGO_COLOR}
            echo $DJANGO_INACTIVE > .color_django
            docker image prune -f

      # Nginx만 재배포 (PROD-NGINX 라벨)
      - name: Deploy NGINX only
        if: needs.check-labels.outputs.deploy-nginx == 'true' && needs.check-labels.outputs.deploy-all != 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY_PROD }}
          script: |
            cd ${{ env.DEPLOY_PATH }}

            echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

            docker compose -f docker-compose.prod.yml pull -q nginx
            docker compose -f docker-compose.prod.yml up -d --no-deps nginx
            docker image prune -f

            sleep 5
            curl -sf http://localhost/health/ || exit 1

      # Spring만 Blue-Green 배포 (PROD-SPRING 라벨)
      - name: Deploy SPRING only (Blue-Green)
        if: needs.check-labels.outputs.deploy-spring == 'true' && needs.check-labels.outputs.deploy-all != 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY_PROD }}
          script: |
            cd ${{ env.DEPLOY_PATH }}

            echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

            DJANGO_COLOR=$(cat .color_django 2>/dev/null || echo "blue")
            SPRING_COLOR=$(cat .color_spring 2>/dev/null || echo "blue")
            SPRING_INACTIVE=$([ "$SPRING_COLOR" = "blue" ] && echo "green" || echo "blue")

            docker compose -f docker-compose.prod.yml --profile $SPRING_INACTIVE pull -q spring-${SPRING_INACTIVE}
            docker compose -f docker-compose.prod.yml --profile $SPRING_INACTIVE up -d --no-deps --force-recreate --wait spring-${SPRING_INACTIVE}

            cat > nginx/upstream.conf << UPCONF
            upstream django_backend {
                server django-${DJANGO_COLOR}:8000;
                keepalive 32;
            }
            upstream spring_backend {
                server spring-${SPRING_INACTIVE}:8080;
                keepalive 32;
            }
            UPCONF
            docker compose -f docker-compose.prod.yml exec nginx nginx -s reload

            sleep 5
            curl -sf http://localhost/health/spring || exit 1

            docker compose -f docker-compose.prod.yml stop spring-${SPRING_COLOR}
            echo $SPRING_INACTIVE > .color_spring
            docker image prune -f

      - name: Deployment summary
        if: success()
        run: |
          echo "프로덕션 배포 완료 - ${{ github.sha }}"
          echo "PROD: ${{ needs.check-labels.outputs.deploy-all }}"
          echo "PROD-DJANGO: ${{ needs.check-labels.outputs.deploy-django }}"
          echo "PROD-NGINX: ${{ needs.check-labels.outputs.deploy-nginx }}"
          echo "PROD-SPRING: ${{ needs.check-labels.outputs.deploy-spring }}"
